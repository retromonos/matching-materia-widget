<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script src="materia.scorecore.js"></script>
        <link rel="stylesheet" type="text/css" href="scorescreen.css" />
        <title>Matching Score Screen</title>
    </head>
    <body>
        <section id="mainContainer" class="container">
            <div id="message"></div>
            
            <h1 id="responses" class="headings">Assessment Complete</h1>
            <p class="sub-heading">Review your answers below</p>
            
            <div id="score-card-list">
                </div>
        </section>

        <section id="scoreTableContainer" class="container" style="display:none;">
            <table id="screenReader" class="screenReader" role="table" aria-live="polite">
                <thead>
                    <tr>
                        <th>Question</th>
                        <th>Your Response</th>
                        <th>Correct Answer</th>
                    </tr>
                </thead>
                <tbody id="screenReaderTbody"></tbody>
            </table>
        </section>

        <template id="card-template">
            <div class="match-row">
                
                <div class="pair-label">PAIR #</div>
                
                <div class="interaction-container">
                    
                    <div class="pill term-pill">Term Text</div>

                    <div class="connector">
                        <div class="line"></div>
                        <div class="icon-badge"></div> <div class="line"></div>
                    </div>

                    <div class="pill user-pill">User Answer</div>
                </div>

                <div class="correction-container">
                    <span class="correction-label">Correct answer:</span>
                    <div class="pill correct-pill">Correct Answer Text</div>
                </div>
            </div>
        </template>

        <script src="scorescreen.js"></script>
    </body>
</html>
